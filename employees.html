<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employees - ModernTech HR</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">💼</div>
          <div class="logo-text">
            <h2>ModernTech</h2>
            <p>HR System</p>
          </div>
        </div>

        <nav>
          <ul class="nav-links">
            <li>
              <a href="dashboard.html"
                ><i class="fa-solid fa-house"></i>Dashboard</a
              >
            </li>
            <li class="active">
              <a href="employees.html"
                ><i class="fa-solid fa-people-group"></i>Employees</a
              >
            </li>
            <li>
              <a href="payroll.html"
                ><i class="fa-solid fa-money-bill-wave"></i>Payroll</a
              >
            </li>
            <li>
              <a href="time-off.html"
                ><i class="fa-solid fa-calendar-days"></i>Time Off</a
              >
            </li>
            <li>
              <a href="attendance.html"
                ><i class="fa-solid fa-clock"></i>Attendance</a
              >
            </li>
            <li>
              <a href="reviews.html"><i class="fa-solid fa-star"></i>Reviews</a>
            </li>
          </ul>
        </nav>

        <div class="sidebar-bottom">
          <div class="profile">
            <div class="avatar">HR</div>
            <div class="profile-info">
              <h3>HR Department</h3>
              <p>Manage records</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- Header -->
        <header id="employees-header">
          <div class="header-row">
            <div>
              <h1>Employees</h1>
              <p>Manage your team members and their information</p>
            </div>
            <div class="header-actions">
              <button type="button" class="btn-secondary" id="filterBtn">
                <i class="fa-solid fa-filter"></i>
                <span>Filter</span>
              </button>
              <button type="button" class="btn-primary" id="addEmployeeBtn">
                <i class="fa-solid fa-plus"></i>
                <span>Add Employee</span>
              </button>
            </div>
          </div>
        </header>

        <!-- Content -->
        <section id="employees-content">
          <div class="search-wrapper">
            <div class="search-bar">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                id="employeeSearch"
                type="text"
                placeholder="Search employees..."
                aria-label="Search employees"
              />
            </div>
          </div>

          <div id="employeeGrid" class="employee-grid" aria-live="polite"></div>

          <div id="employeeEmpty" class="empty-state" style="display: none">
            <i class="fa-solid fa-users"></i>
            <h4>No employees found</h4>
            <p>Try adjusting your search or filters</p>
          </div>
        </section>
      </main>
    </div>

    <!-- Employee Profile Modal - NEW V2 -->
    <div
      id="employeeProfileOverlay"
      class="emp-modal-overlay"
      style="display: none"
    >
      <div class="emp-modal">
        <div class="emp-modal-header">
          <h3 id="empModalTitle">Employee Profile</h3>
          <button type="button" id="closeEmpModalBtn" class="emp-modal-close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="empModalBody" class="emp-modal-body"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toastContainer"
      class="toast-container"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
