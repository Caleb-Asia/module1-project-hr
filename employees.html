<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employees - ModernTech HR</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    <div class="page-wrapper">
      <aside class="sidebar">
          <div class="navbar-rail">
            <ul class="nav-links nav-links-left">
                <li><a href="dashboard.html">
                        <i class="bi bi-house"></i>
                        <span>Dashboard</span></a></li>
                <li><a href="employees.html">
                        <i class="bi bi-people"></i><span>Employees</span></a></li>
                <li><a href="payroll.html">
                        <i class="bi bi-cash"></i><span>Payroll</span></a></li>
            </ul>

            <div class="logo">
                <div class="logo-icon">💼</div>
                <div class="logo-text">
                    <h2>ModernTech</h2>
                    <p>HR System</p>
                </div>
            </div>

            <ul class="nav-links nav-links-right">
                <li><a href="time-off.html">
                        <i class="bi bi-calendar-event"></i><span>Time Off</span></a></li>
                <li class="active"><a href="attendance.html">
                        <i class="bi bi-clock"></i><span>Attendance</span></a></li>
                <li><a href="reviews.html">
                        <i class="bi bi-star"></i><span>Reviews</span></a></li>
            </ul>
          </div>

        <div class="sidebar-bottom">
            <button class="signout-btn" id="signOutBtn" type="button">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign Out</span>
            </button>
            <div class="profile">
                <div class="avatar">HR</div>
                <div class="profile-info">
                    <h3>HR Department</h3>
                    <p>Manage records</p>
                </div>
            </div>
        </div>
        </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- Header -->
        <header id="employees-header">
          <div class="header-row">
            <div>
              <h1>Employees</h1>
              <p>Manage your team members and their information</p>
            </div>
            <div class="header-actions">
              <button type="button" class="btn-secondary" id="filterBtn">
                <i class="fa-solid fa-filter"></i>
                <span>Filter</span>
              </button>
              <button type="button" class="btn-primary" id="addEmployeeBtn">
                <i class="fa-solid fa-plus"></i>
                <span>Add Employee</span>
              </button>
            </div>
          </div>
        </header>

        <!-- Content -->
        <section id="employees-content">
          <div class="search-wrapper">
            <div class="search-bar">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                id="employeeSearch"
                type="text"
                placeholder="Search employees..."
                aria-label="Search employees"
              />
            </div>
          </div>

          <div id="employeeGrid" class="employee-grid" aria-live="polite"></div>

          <div id="employeeEmpty" class="empty-state" style="display: none">
            <i class="fa-solid fa-users"></i>
            <h4>No employees found</h4>
            <p>Try adjusting your search or filters</p>
          </div>
        </section>
      </main>
    </div>

    <!-- Employee Profile Modal - NEW V2 -->
    <div
      id="employeeProfileOverlay"
      class="emp-modal-overlay"
      style="display: none"
    >
      <div class="emp-modal">
        <div class="emp-modal-header">
          <h3 id="empModalTitle">Employee Profile</h3>
          <button type="button" id="closeEmpModalBtn" class="emp-modal-close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="empModalBody" class="emp-modal-body"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toastContainer"
      class="toast-container"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
