<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Off - HR System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="page-wrapper">

        <aside class="sidebar">
            <div class="top-section">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="bi bi-briefcase-fill" style="color: white;"></i>
                    </div>
                    <div class="logo-text">
                        <h2>ModernTech</h2>
                        <p>HR System</p>
                    </div>
                </div>

                <nav>
                    <ul class="nav-links">
                        <li><a href="dashboard.html">
                            <i class="bi bi-house"></i>
                            <span>Dashboard</span></a></li>

                        <li><a href="employees.html">
                            <i class="bi bi-people"></i><span>Employees</span></a></li>
                        <li><a href="payroll.html">
                            <i class="bi bi-cash"></i><span>Payroll</span></a></li>
                        <li class="active"><a href="time-off.html">
                            <i class="bi bi-calendar-event"></i><span>Time Off</span></a></li>
                        <li><a href="attendance.html">
                            <i class="bi bi-clock"></i><span>Attendance</span></a></li>
                        <li><a href="reviews.html">
                            <i class="bi bi-star"></i><span>Reviews</span></a></li>
                        <li><a href="#" id="signOutBtn">
                            <i class="bi bi-box-arrow-right"></i><span>Sign Out</span></a></li>
                    </ul>
                </nav>
            </div>

            <div class="sidebar-bottom">
                <div class="profile">
                    <div class="avatar">HR</div>
                    <div class="profile-info">
                        <h3>HR Department</h3>
                        <p>Manage records</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="dashboard-container">

            <header class="timeoff-header">
                <div class="header-text">
                    <h1>Time Off</h1>
                    <p>Manage leave requests and approvals</p>
                </div>
                <button class="btn-new-request" id="openModalBtn">
                    <i class="bi bi-plus"></i> New Request
                </button>
            </header>

            <section class="status-summary-grid">
                <div class="status-card">
                    <span class="status-count text-blue" id="pendingCount">0</span>
                    <span class="status-label">Pending</span>
                </div>
                <div class="status-card">
                    <span class="status-count text-green" id="approvedCount">0</span>
                    <span class="status-label">Approved</span>
                </div>
                <div class="status-card">
                    <span class="status-count text-red" id="rejectedCount">0</span>
                    <span class="status-label">Rejected</span>
                </div>
            </section>

            <div class="filter-tabs">
                <button class="tab-btn active">All</button>
                <button class="tab-btn">Pending</button>
                <button class="tab-btn">Approved</button>
                <button class="tab-btn">Rejected</button>
            </div>

            <section class="requests-container" id="leaveRequestsList"></section>
        </main>
    </div>

    <div class="modal-overlay" id="requestModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>New Time Off Request</h2>
                <button class="close-modal-btn" id="closeModalIcon">&times;</button>
            </div>

            <form id="timeOffForm">
                <div class="form-group">
                    <label for="employeeSelect">Employee *</label>
                    <select id="employeeSelect" required>
                        <option value="" disabled selected>Select employee...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="leaveType">Leave Type</label>
                    <select id="leaveType">
                        <option value="Annual">Annual</option>
                        <option value="Sick">Sick Leave</option>
                        <option value="Personal">Personal Leave</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate"> Start Date *</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate"> End Date *</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reasonInput">Reason *</label>
                    <textarea id="reasonInput" rows="3" placeholder="Brief reason for the leave request..." required></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-modal-cancel" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn-modal-submit">Submit Request</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
